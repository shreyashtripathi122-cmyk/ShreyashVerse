<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe vs Shreyash</title>
<style>
    body { background: #0a0a0a; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
    h1 { color: #00c8ff; margin-bottom: 10px; }
    #status { font-size: 1.2rem; margin-bottom: 20px; color: #b45cff; font-weight: 600; height: 25px; }
 .board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 10px; }
 .cell { width: 100px; height: 100px; background: #111; border: 2px solid #222; display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: 700; cursor: pointer; border-radius: 10px; }
 .cell.x { color: #00c8ff; }.cell.o { color: #ff00c8; }
 .btn { background: #00c8ff; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>
<h1>Tic Tac Toe vs Shreyash 🤖</h1>
<div id="status">Your Turn: X</div>
<div class="board" id="board"></div>
<button class="btn" onclick="restartGame()">Restart</button>
<script>
const boardEl = document.getElementById('board'); const statusEl = document.getElementById('status');
let board = ['', '', '']; let currentPlayer = 'X'; let gameActive = true;
function renderBoard() { boardEl.innerHTML = ''; board.forEach((cell, index) => { const cellEl = document.createElement('div'); cellEl.classList.add('cell'); if(cell === 'X') cellEl.classList.add('x'); if(cell === 'O') cellEl.classList.add('o'); cellEl.innerText = cell; cellEl.addEventListener('click', () => handleCellClick(index)); boardEl.appendChild(cellEl); }); }
function handleCellClick(index) { if(board[index]!== '' ||!gameActive || currentPlayer === 'O') return; board[index] = 'X'; currentPlayer = 'O'; statusEl.innerText = "Shreyash Thinking..."; renderBoard(); if(checkWinner()) return; setTimeout(shreyashMove, 700); }
function shreyashMove() { let bestScore = -Infinity; let move; for(let i = 0; i < 9; i++) { if(board[i] === '') { board[i] = 'O'; let score = minimax(board, 0, false); board[i] = ''; if(score > bestScore) { bestScore = score; move = i; } board[move] = 'O'; currentPlayer = 'X'; statusEl.innerText = "Your Turn: X"; renderBoard(); checkWinner(); }
function checkWinner() { const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let pattern of winPatterns) { const [a,b,c] = pattern; if(board[a] && board[a] === board[b] && board[a] === board[c]) { gameActive = false; statusEl.innerText = board[a] === 'X'? "You Won! 🎉" : "Shreyash Won! 🤖"; return true; } if(!board.includes('')) { gameActive = false; statusEl.innerText = "It's a Draw!"; return true; } return false; }
function minimax(newBoard, depth, isMaximizing) { let scores = { X: -1, O: 1, tie: 0 }; const result = checkWinnerMinimax(newBoard); if(result!== null) return scores[result]; if(isMaximizing) { let bestScore = -Infinity; for(let i = 0; i < 9; i++) { if(newBoard[i] === '') { newBoard[i] = 'O'; let score = minimax(newBoard, depth + 1, false); newBoard[i] = ''; bestScore = Math.max(score, bestScore); } return bestScore; } else { let bestScore = Infinity; for(let i = 0; i < 9; i++) { if(newBoard[i] === '') { newBoard[i] = 'X'; let score = minimax(newBoard, depth + 1, true); newBoard[i] = ''; bestScore = Math.min(score, bestScore); } return bestScore; } }
function checkWinnerMinimax(b) { const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let pattern of winPatterns) { const [a,b1,c] = pattern; if(b[a] && b[a] === b[b1] && b[a] === b[c]) return b[a]; } if(!b.includes('')) return 'tie'; return null; }
function restartGame() { board = ['', '', '']; currentPlayer = 'X'; gameActive = true; statusEl.innerText = "Your Turn: X"; renderBoard(); }
renderBoard();
</script>
</body>
</html>
